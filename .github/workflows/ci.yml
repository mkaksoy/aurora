name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux packages for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Fix icon formats
        run: |
          pip install pillow -q
          python3 - <<'EOF'
          import glob
          from PIL import Image
          for path in glob.glob("src-tauri/icons/*.png"):
              img = Image.open(path).convert("RGBA")
              img.save(path)
          EOF

      - name: Download Kotlin LSP (Linux)
        run: |
          VERSION=$(gh release view --repo Kotlin/kotlin-lsp --json tagName -q '.tagName' | sed 's/kotlin-lsp\/v//')
          echo "Downloading kotlin-lsp version: ${VERSION}"
          curl -fL "https://download-cdn.jetbrains.com/kotlin-lsp/${VERSION}/kotlin-server-${VERSION}.tar.gz" \
            -o kotlin-lsp.tar.gz
          mkdir -p kotlin-lsp
          tar -xzf kotlin-lsp.tar.gz -C kotlin-lsp
          rm kotlin-lsp.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Build frontend
        run: npm run build

  package-windows:
    name: Package Windows app
    runs-on: windows-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Kotlin LSP (Windows)
        run: |
          $version = (gh release view --repo Kotlin/kotlin-lsp --json tagName -q '.tagName') -replace 'kotlin-lsp/v', ''
          Write-Host "Downloading kotlin-lsp version: $version"
          $url = "https://download-cdn.jetbrains.com/kotlin-lsp/$version/kotlin-server-$version.win.zip"
          curl.exe -fL $url -o kotlin-lsp.zip
          New-Item -ItemType Directory -Force -Path kotlin-lsp
          Expand-Archive -Path kotlin-lsp.zip -DestinationPath kotlin-lsp -Force
          Remove-Item kotlin-lsp.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri -- build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aurora-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/*.exe
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: aurora-windows
          path: artifacts/windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/windows/**